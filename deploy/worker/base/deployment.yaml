apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/YOUR_GITHUB_USER/worker:latest
          ports:
            - containerPort: 8080
          env:
            - name: REGION
              value: "region-b"
