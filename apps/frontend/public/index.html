<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multi-Region Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #101820;
      color: #f5f5f5;
    }
    .card {
      background: #1b2631;
      padding: 20px;
      border-radius: 12px;
      max-width: 900px;
    }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-right: 10px;
      margin-bottom: 10px;
    }
    pre {
      background: #0d1117;
      padding: 16px;
      border-radius: 8px;
      overflow: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Multi-Region Demo</h1>
    <p>Frontend in Region A, API in Region A, Worker in Region B.</p>

    <button onclick="callApi()">Test Frontend → API</button>
    <button onclick="runWorkerJob()">Test Frontend → API → Worker</button>

    <pre id="output">Click a button to test the flow...</pre>
  </div>

  <script>
    async function callApi() {
      const output = document.getElementById("output");
      output.textContent = "Calling API...";
      try {
        const response = await fetch("/api/message");
        const data = await response.json();
        output.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        output.textContent = "Error calling API: " + error.message;
      }
    }

    async function runWorkerJob() {
      const output = document.getElementById("output");
      output.textContent = "Calling API, which will call Worker in other region...";
      try {
        const response = await fetch("/api/run-job", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            test: "cross-region-call",
            requestedAt: new Date().toISOString()
          })
        });
        const data = await response.json();
        output.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        output.textContent = "Error running cross-region job: " + error.message;
      }
    }
  </script>
</body>
</html>
