apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ghcr.io/YOUR_GITHUB_USER/api:latest
          ports:
            - containerPort: 8080
          env:
            - name: REGION
              value: "region-a"
            - name: WORKER_URL
              value: "http://worker.region-b.example.com"
